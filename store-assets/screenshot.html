<!DOCTYPE html>
<html class="li-focus-blocked">
<head>
<meta charset="utf-8">
<title>LinkedIn Focus — screenshot source</title>
<link rel="stylesheet" href="../style.css">
<style>
  html, body { margin: 0; height: 100%; }
</style>
</head>
<body>
  <div id="__li_focus_block__">
    <div class="li-focus-card">
      <div class="li-focus-emoji">🎯</div>
      <h1>Feed blocked</h1>
      <p class="li-focus-sub">You only need Messages and Jobs here.</p>
      <blockquote class="li-focus-quote">
        "Where your attention goes, your time goes."
        <cite>— Idowu Koyenikan</cite>
      </blockquote>
      <div class="li-focus-streak">
        🛡️ Saved you <strong>3×</strong> today · <strong>14×</strong> this week
      </div>
      <div class="li-focus-links">
        <a href="#">Messages</a>
        <a href="#">Jobs</a>
      </div>
      <button type="button" class="li-focus-unlock">I really need the feed for 5 minutes</button>
    </div>
  </div>
</body>
</html>
